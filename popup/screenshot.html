<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screenshot Editor</title>
    <link rel="stylesheet" href="screenshot-editor.css">
</head>

<body>
    <!-- ===== PREVIEW MODE (shown first) ===== -->
    <div class="preview-mode" id="preview-mode">
        <div class="preview-loading" id="preview-loading">
            <div class="spinner"></div>
            <span>Processing screenshot...</span>
        </div>
        <div class="preview-content" id="preview-content" style="display:none">
            <div class="preview-image-wrap" id="preview-image-wrap">
                <canvas id="preview-canvas"></canvas>
            </div>
            <div class="preview-actions">
                <button class="preview-btn preview-btn-discard" id="preview-btn-discard">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M5 6v14a2 2 0 002 2h10a2 2 0 002-2V6"/></svg>
                    Discard
                </button>
                <button class="preview-btn preview-btn-edit" id="preview-btn-edit">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    Edit
                </button>
                <button class="preview-btn preview-btn-download" id="preview-btn-download">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Download
                </button>
            </div>
        </div>
    </div>

    <!-- ===== EDITOR MODE (hidden initially) ===== -->
    <div class="editor-layout" id="editor-layout" style="display:none">
        <!-- ===== TOP TOOLBAR ===== -->
        <div class="editor-toolbar">
            <!-- Drawing Tools -->
            <div class="toolbar-group" id="toolbar-tools">
                <button class="tool-btn active" data-tool="select" title="Select (V)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/><path d="M13 13l6 6"/></svg>
                </button>
                <button class="tool-btn" data-tool="rect" title="Rectangle (R)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
                </button>
                <button class="tool-btn" data-tool="circle" title="Circle (C)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="12" rx="10" ry="10"/></svg>
                </button>
                <button class="tool-btn" data-tool="arrow" title="Arrow (A)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="19" x2="19" y2="5"/><polyline points="12 5 19 5 19 12"/></svg>
                </button>
                <button class="tool-btn" data-tool="line" title="Line (L)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="20" x2="20" y2="4"/></svg>
                </button>
                <button class="tool-btn" data-tool="step" title="Step Number (N)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><text x="12" y="16" text-anchor="middle" fill="currentColor" stroke="none" font-size="12" font-weight="700">1</text></svg>
                </button>
                <button class="tool-btn" data-tool="text" title="Text (T)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 7 4 4 20 4 20 7"/><line x1="12" y1="4" x2="12" y2="20"/><line x1="8" y1="20" x2="16" y2="20"/></svg>
                </button>
                <button class="tool-btn" data-tool="highlight" title="Highlight (H)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="8" width="18" height="8" rx="1" fill="rgba(250,204,21,0.4)" stroke="currentColor"/></svg>
                </button>
                <button class="tool-btn" data-tool="blur" title="Blur (B)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9" opacity="0.4"/><line x1="3" y1="15" x2="21" y2="15" opacity="0.4"/><line x1="9" y1="3" x2="9" y2="21" opacity="0.4"/><line x1="15" y1="3" x2="15" y2="21" opacity="0.4"/></svg>
                </button>
                <button class="tool-btn" data-tool="eyedropper" title="Eyedropper (I)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/><path d="M19 8l-5-5"/><path d="M18 5l3 3"/><path d="M7 15l-4 4v4h4l4-4"/></svg>
                </button>
            </div>

            <div class="toolbar-divider"></div>

            <!-- Style Controls -->
            <div class="toolbar-group" id="toolbar-style">
                <span class="toolbar-label">Color</span>
                <div class="toolbar-color-wrap" id="color-wrap">
                    <input type="color" id="tool-color" value="#ef4444">
                </div>

                <span class="toolbar-label" style="margin-left:8px">Width</span>
                <select class="toolbar-select" id="tool-stroke-width">
                    <option value="2">2px</option>
                    <option value="3" selected>3px</option>
                    <option value="4">4px</option>
                    <option value="5">5px</option>
                    <option value="8">8px</option>
                </select>

                <button class="fill-toggle" id="tool-fill-toggle" title="Toggle Fill">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>
                    Fill
                </button>

                <span class="toolbar-label" style="margin-left:8px">Font</span>
                <input type="number" class="toolbar-number-input" id="tool-font-size" value="18" min="8" max="72" title="Font Size">
            </div>

            <div class="toolbar-divider"></div>

            <!-- Undo / Redo -->
            <div class="toolbar-group">
                <button class="tool-btn" id="btn-undo" title="Undo (Ctrl+Z)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
                </button>
                <button class="tool-btn" id="btn-redo" title="Redo (Ctrl+Y)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.13-9.36L23 10"/></svg>
                </button>
            </div>

            <div class="toolbar-divider"></div>

            <!-- Grid toggle -->
            <div class="toolbar-group">
                <button class="tool-btn" id="btn-grid" title="Snap Grid (G)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
                </button>
            </div>

            <!-- Spacer -->
            <div style="flex:1"></div>

            <!-- Step counter display -->
            <div class="toolbar-group" id="step-counter-display" style="display:none">
                <span class="toolbar-label">Next step:</span>
                <span id="step-counter-value" style="color:var(--ed-accent);font-weight:700;font-size:14px">1</span>
                <button class="tool-btn" id="btn-reset-steps" title="Reset counter" style="width:28px;height:28px">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
                </button>
            </div>
        </div>

        <!-- ===== CANVAS AREA ===== -->
        <div class="editor-canvas-area" id="canvas-area" data-tool="select">
            <div class="canvas-wrapper" id="canvas-wrapper">
                <canvas id="canvas-bg"></canvas>
                <canvas id="canvas-overlay"></canvas>
            </div>
            <!-- Eyedropper Loupe (Magnifier) -->
            <div id="loupe-wrap" class="loupe-container" style="display:none">
                <canvas id="loupe-canvas" width="120" height="120"></canvas>
                <div class="loupe-hex" id="loupe-hex">#ffffff</div>
                <div class="loupe-crosshair"></div>
            </div>
        </div>

        <!-- ===== BOTTOM BAR ===== -->
        <div class="editor-bottombar">
            <div class="bottombar-group">
                <button class="btn-action btn-discard" id="btn-discard">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M5 6v14a2 2 0 002 2h10a2 2 0 002-2V6"/></svg>
                    Discard
                </button>
            </div>

            <div class="bottombar-group">
                <button class="btn-zoom" id="btn-zoom-out" title="Zoom Out">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
                <span class="zoom-display" id="zoom-display">100%</span>
                <button class="btn-zoom" id="btn-zoom-in" title="Zoom In">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </button>
                <button class="btn-zoom" id="btn-zoom-fit" title="Fit to Screen" style="margin-left:4px;width:auto;padding:0 8px;font-size:11px">
                    Fit
                </button>
            </div>

            <div class="bottombar-group">
                <button class="btn-action" id="btn-copy" title="Copy to Clipboard">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 11h6v6H9z"/></svg>
                    Copy
                </button>
                <button class="btn-action btn-save" id="btn-download">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    Download
                </button>
            </div>
        </div>
    </div>

    <!-- ===== TEXT INPUT MODAL (fixed position, outside transforms) ===== -->
    <div class="text-modal-backdrop" id="text-modal-backdrop" style="display:none">
        <div class="text-modal">
            <div class="text-modal-header">
                <span>Add Text</span>
                <button class="text-modal-close" id="text-modal-cancel">✕</button>
            </div>
            <textarea id="text-modal-input" placeholder="Type your text here..." rows="3"></textarea>
            <div class="text-modal-footer">
                <button class="text-modal-btn text-modal-btn-cancel" id="text-modal-cancel2">Cancel</button>
                <button class="text-modal-btn text-modal-btn-ok" id="text-modal-ok">OK</button>
            </div>
        </div>
    </div>

    <script src="screenshot.js"></script>
</body>

</html>
